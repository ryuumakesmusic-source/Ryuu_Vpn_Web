kind = "web"
previewPath = "/"
title = "RYUU VPN"
version = "1.0.0"
id = "artifacts/ryuu-vpn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26090

[services.development]
run = "pnpm --filter @workspace/ryuu-vpn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ryuu-vpn", "run", "build" ]
publicDir = "artifacts/ryuu-vpn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26090"
BASE_PATH = "/"
